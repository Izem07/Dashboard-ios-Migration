name: Dashboard v1.0.0

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Feds Dash iOS Build
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Link ios folder into dash
        run: rm -rf ${{ github.workspace }}/dash/ios && ln -s ${{ github.workspace }}/ios ${{ github.workspace }}/dash/ios

      - run: flutter pub get
        working-directory: dash

      - name: Generate iOS app icons
        run: dart run flutter_launcher_icons
        working-directory: dash

      - name: Generate Flutter build files
        run: flutter build ios --config-only
        working-directory: dash

      - name: Build iOS with xcodebuild
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build
        working-directory: dash

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r build/ios/Build/Products/Release-iphoneos/Runner.app Payload/
          zip -qq -r -9 "Feds Dash v1.0.0.ipa" Payload
        working-directory: dash

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: "dash/Feds Dash v1.0.0.ipa"
          tag: v1.0.0
          release_name: Dashboard v1.0.0
          overwrite: true
          body: "first release"
