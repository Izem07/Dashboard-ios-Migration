name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
          
      - name: Get Flutter dependencies
        run: flutter pub get
        working-directory: scouting/android
        
      - name: Update CocoaPods
        run: pod repo update
        working-directory: scouting/android/ios

      - name: Build iOS Release
        run: flutter build ios --release --no-codesign
        working-directory: scouting/android

      - name: Create Payload directory
        run: mkdir -p Payload
        working-directory: scouting/android/build/ios/iphoneos

      - name: Move app to Payload
        run: mv Runner.app Payload/
        working-directory: scouting/android/build/ios/iphoneos

      - name: Create IPA
        run: zip -r -9 FlutterIpaExport.ipa Payload
        working-directory: scouting/android/build/ios/iphoneos

      - name: Upload IPA to Release
        uses: softprops/action-gh-release@v1
        with:
          files: scouting/android/build/ios/iphoneos/FlutterIpaExport.ipa
          tag_name: v1.0.0
          prerelease: false
          body: "iOS IPA Release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}